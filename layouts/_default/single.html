{{ define "main" }}
<div class="container">
    <h2>JSON 数据解析</h2>
    <p>在下方输入或粘贴 JSON 文本，点击解析按钮，数据将以卡片形式展示：</p>

    <!-- JSON 输入区域 -->
    <div class="json-parser">
        <div class="json-input-section">
            <textarea id="jsonInput" placeholder='粘贴 JSON 文本，例如：
[
  {"name": "张三", "email": "zhangsan@example.com", "age": 28, "department": "技术部", "skills": ["Go", "Python"]},
  {"name": "李四", "email": "lisi@example.com", "age": 32, "department": "市场部", "skills": ["营销", "数据分析"]}
]' rows="10"></textarea>
            <div class="json-actions">
                <button id="parseBtn" class="action-btn parse-btn">解析 JSON</button>
                <button id="clearBtn" class="action-btn clear-btn">清空</button>
                <button id="sampleBtn" class="action-btn sample-btn">加载示例</button>
            </div>
        </div>

        <div id="jsonError" class="json-error" style="display:none;"></div>
    </div>

    <!-- 解析结果 - 卡片展示（同首页风格） -->
    <div id="jsonResult" style="display:none;">
        <div class="search-box">
            <input type="text" id="resultSearchInput" placeholder="搜索..." />
        </div>
        <div id="resultFilterButtons" class="filter-buttons"></div>
        <div id="resultCardGrid" class="employee-grid"></div>
        <div id="resultStats" class="stats"></div>
    </div>
</div>
{{ end }}
