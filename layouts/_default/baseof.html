<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
    <header>
        <h1>{{ .Site.Title }}</h1>
        <nav>
            <a href="{{ "/" | relURL }}">首页</a>
            <a href="{{ "/json-data" | relURL }}">JSON数据</a>
        </nav>
    </header>
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    
    <footer>
        <p>&copy; 2026 {{ .Site.Title }}. All rights reserved.</p>
    </footer>
    
    <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
