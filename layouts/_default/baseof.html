<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }} - 在线JSON解析工具</title>

    <!-- SEO Meta -->
    <meta name="description" content="在线JSON解析工具，支持格式化、压缩、表格视图、树形视图和统计信息，输入JSON文本即可实时解析。">
    <meta name="keywords" content="JSON解析,JSON格式化,JSON压缩,在线JSON工具,静态网站,Hugo">
    <meta name="author" content="turningOwei">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ .Permalink }}">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ .Site.Title }} - 在线JSON解析">
    <meta property="og:description" content="在线JSON解析工具，支持格式化、表格、树形等多种视图">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:site_name" content="{{ .Site.Title }}">
    <meta property="og:locale" content="zh_CN">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ .Site.Title }}">
    <meta name="twitter:description" content="在线JSON解析工具">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "{{ .Site.Title }}",
      "url": "{{ .Site.BaseURL }}",
      "description": "在线JSON解析工具，支持格式化、压缩、表格视图、树形视图和统计信息",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "CNY"
      },
      "inLanguage": "zh-CN"
    }
    </script>

    <link rel="stylesheet" href="{{ absURL "css/style.css" }}">
</head>
<body>
    <header>
        <h1>{{ .Site.Title }}</h1>
    </header>
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    
    <footer>
        <p>&copy; 2026 {{ .Site.Title }}. All rights reserved.</p>
    </footer>
    
    <script src="{{ absURL "js/main.js" }}"></script>
</body>
</html>
